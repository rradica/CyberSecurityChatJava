<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecAssist – Security Operations</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    <span>SecAssist</span>
                </div>
                <p class="tagline">Sicherheitsoperationen</p>
            </div>

            <div class="sidebar-section">
                <label for="roleSelect">Ihre Rolle</label>
                <select id="roleSelect">
                    <option value="employee" selected>Mitarbeiter</option>
                    <option value="security_analyst">Security-Analyst</option>
                    <option value="contractor">Externer</option>
                </select>
            </div>

            <div class="sidebar-section">
                <label for="caseSelect">Demo-Fall</label>
                <select id="caseSelect">
                    <option value="">Bitte Fall auswählen</option>
                </select>
            </div>

            <button class="btn-new-chat" onclick="newConversation()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Neues Gespraech
            </button>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="dot online"></span>
                    <span>System aktiv</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <h1>Sicherheitsvorfall-Assistent</h1>
                <span class="role-badge" id="roleBadge">Mitarbeiter</span>
            </header>

            <section class="case-panel" id="casePanel">
                <div class="case-panel-empty">
                    <h2>Fall auswählen</h2>
                    <p>Waehlen Sie zuerst einen Demo-Fall aus. SecAssist zeigt dann eine kompakte Lagebeschreibung, Artefakte und moegliche naechste Schritte an.</p>
                </div>
            </section>

            <div class="messages" id="messages">
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="chatInput" rows="1"
                              placeholder="Beschreiben Sie einen Sicherheitsvorfall oder stellen Sie eine Frage..."
                              autocomplete="off"></textarea>
                    <button onclick="sendMessage()" id="btnSend" class="btn-send" title="Senden">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
